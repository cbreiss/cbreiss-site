# Site Settings
title: "Breiss Lab"
subtitle: "Computational and Experimental Linguistics"
email: cbreiss@usc.edu
description: >-
  Breiss Lab studies phonology using computational and experimental methods,
  with interests in learning, phonological representations, and the
  phonology-morphosyntax-lexicon interface.
baseurl: "" # empty for custom domain deployment
url: "https://lab.cbreiss.com"
repository: "cbreiss/breisslab"

# Theme Settings
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "default"

# Site Author
author:
  name: "Canaan Breiss"
  avatar: "/assets/images/bio-photo.jpg"
  bio: "Assistant Professor, USC Linguistics"
  location: "University of Southern California"
  email: "cbreiss@usc.edu"
  links:
    - label: "Google Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: "https://scholar.google.com/citations?user=_vUbgoEAAAAJ&hl=en"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/cbreiss"
    - label: "cbreiss.com"
      icon: "fas fa-fw fa-link"
      url: "https://cbreiss.com"

# Reading Files
include:
  - _pages

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md

# Outputting
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: America/Los_Angeles

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Disable GitHub metadata for local builds
github: [metadata]

# Defaults
defaults:
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true

# Collections
collections:
  people:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/

# Archive settings
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
